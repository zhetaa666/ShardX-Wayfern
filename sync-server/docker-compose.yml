services:
  sync-server:
    build:
      context: .
      network: host
    container_name: shardx-sync-server
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      minio:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: shardx-sync-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-shardxsync}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-this-minio-password}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
