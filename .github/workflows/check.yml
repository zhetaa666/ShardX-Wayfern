name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ci-win-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ci-win-x64-
      - name: cargo check
        working-directory: src-tauri
        run: cargo check --lib --target x86_64-pc-windows-msvc
