name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ci-win-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ci-win-x64-
      - name: cargo check
        working-directory: src-tauri
        run: cargo check --lib --target x86_64-pc-windows-msvc
      - name: cargo test (wayfern module only)
        working-directory: src-tauri
        run: cargo test --lib --target x86_64-pc-windows-msvc wayfern::

  check-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ci-linux-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ci-linux-x64-
      - name: cargo check
        working-directory: src-tauri
        run: cargo check --lib --target x86_64-unknown-linux-gnu
